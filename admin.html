<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Vagabond Scans</title>

    <!-- Firebase CDN SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-storage-compat.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="assets/favicon_io/site.webmanifest">
</head>
<body style="background: var(--bg-base); background-image: none;">

    <nav class="navbar" style="position: static;">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">ADMIN <span class="highlight">PORTAL</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="btn-transparent" style="padding: 5px 15px; border-radius: 4px;">Back to Site</a>
                <a href="#" id="logoutBtn" style="display:none; color: #ff3e72; font-weight: bold;">Logout <i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </div>
    </nav>

    <main class="admin-main">
        
        <!-- Login Form -->
        <section id="loginSection" class="auth-panel">
            <h2>Staff Authentication</h2>
            <div id="loginError" style="color: #ff3e72; margin-bottom: 20px; font-weight: bold; display: none; text-align: center;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="staff@vagabondscans.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </form>
        </section>

        <!-- Admin Dashboard (Unified Mangadex Flow) -->
        <section id="dashboardSection" class="auth-panel" style="display: none; padding: 25px;">
            
            <div id="tabChapter">
                <h2 style="font-size: 1.3rem; margin-bottom: 25px; text-align: center;"><i class="fa-solid fa-cloud-arrow-up"></i> Upload New Chapter</h2>
                
                <form id="uploadForm">
                    
                    <!-- Unified Series Selection -->
                    <div class="form-group">
                        <label>Select Series</label>
                        <select id="mangaSelect" class="form-control form-select" required>
                            <option value="">Loading Series...</option>
                        </select>
                    </div>

                    <!-- Dynamic "New Series" Fields -->
                    <div id="newSeriesFields" style="display: none; background: rgba(138, 43, 226, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color);">
                        <h3 style="margin-bottom: 15px; font-size: 1.1rem; color: var(--purple-light);"><i class="fa-solid fa-book"></i> Register Details For New Series</h3>
                        <div class="form-group">
                            <label>Series Title</label>
                            <input type="text" id="seriesTitle" class="form-control" placeholder="e.g. Blade of the Ronin">
                        </div>
                        <div class="form-group">
                            <label>Thumbnail Cover URL</label>
                            <input type="url" id="seriesCoverUrl" class="form-control" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label>Author (Optional)</label>
                            <input type="text" id="seriesAuthor" class="form-control" placeholder="Author Name">
                        </div>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">This series will be permanently saved to the database upon chapter upload.</p>
                    </div>
                    
                    <div class="form-group">
                        <label>Chapter Number</label>
                        <input type="number" id="chapterNum" class="form-control" placeholder="e.g. 24" step="0.1" required>
                    </div>

                    <div class="form-group">
                        <label>Upload High-Res Pages (.jpg / .png)</label>
                        <div class="dropzone" id="dropzone">
                            <i class="fa-regular fa-images" style="font-size: 2rem; color: var(--text-secondary); margin-bottom: 10px;"></i>
                            <h3 style="color: var(--text-primary); font-size: 1.1rem;">Drag & Drop Image Files Here</h3>
                            <p style="color: var(--text-muted); font-size: 0.9rem;">or click to browse</p>
                            <input type="file" id="fileInput" class="hidden-input" multiple accept="image/*" required>
                        </div>
                    </div>

                    <button type="submit" class="btn" id="uploadBtn" style="width: 100%;">
                        <i class="fa-solid fa-upload"></i> Upload & Publish
                    </button>
                    <div id="uploadStatus" style="margin-top: 20px; font-weight: bold; color: var(--purple-light); display:none; text-align: center;"></div>
                </form>
            </div>

        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
